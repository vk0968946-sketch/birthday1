<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Avni ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff4d6d, #ff99ac);
    color: white;
    overflow: hidden;
}

/* Heading */
h1 {
    margin-top: 40px;
    font-size: 2.8rem;
    animation: fadeIn 2s ease-in-out;
}

/* Heart animation */
.heart {
    position: fixed;
    color: pink;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* Photo */
img {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    margin-top: 20px;
    border: 5px solid white;
}

/* Button */
button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: white;
    color: #ff4d6d;
    cursor: pointer;
    margin-top: 30px;
}

/* Message */
#msg {
    display: none;
    font-size: 22px;
    margin-top: 20px;
    padding: 10px;
}
</style>
</head>

<body>

<h1>🎂 Happy Birthday My Love Avni ❤️</h1>

<img src="avni.jpg" alt="Avni">

<p>You are the most special person in my life 💖</p>

<button onclick="showLove()">💌 Click for Love Message</button>

<div id="msg">
    💖 Avni, tum meri life ka sabse beautiful part ho.  
    Tumhari smile meri duniya hai.  
    I love you forever ❤️🥰  
</div>

<!-- Romantic Music -->
<audio autoplay loop>
    <source src="romantic.mp3" type="audio/mpeg">
</audio>

<script>
function showLove() {
    document.getElementById("msg").style.display = "block";
}

/* Floating Hearts */
setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>
